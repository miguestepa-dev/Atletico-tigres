<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Inscripción | Atlético Tigres</title>

    <link rel="stylesheet" href="style.css">

</head>

<body class="inscripcion-page">

    <!-- HEADER -->

    <header>

        <nav>

            <h1>Atlético Tigres</h1>

            <ul>

                <li><a href="Atletico tigres.html">Inicio</a></li>

            </ul>

        </nav>

    </header>

    <!-- CONTENIDO -->

    <section class="section formulario-section">

        <div class="form-container">

            <h2>Inscripción</h2>

            <p class="info">
                Forma parte del semillero de talentos de Atlético Tigres.
            </p>

            <!-- INFORMACION -->

            <div class="info-box">

                <h3>Información General</h3>

                <p><strong>Mensualidad:</strong> $120.000 COP</p>

                <p><strong>Matrícula:</strong> $80.000 COP</p>

                <p><strong>Horario:</strong> Lunes a Viernes</p>

                <p><strong>Ubicación:</strong> Bogotá, Colombia</p>

                <p><strong>Teléfono:</strong> +57 300 000 0000</p>

            </div>

            <!-- FORMULARIO -->

            <form class="formulario">

                <input type="text" placeholder="Nombre completo" required>

                <input type="number" placeholder="Edad" required>

                <input type="email" placeholder="Correo electrónico" required>

                <input type="tel" placeholder="Teléfono" required>

                <select required>

                    <option value="">Categoría</option>

                    <option>Sub 8</option>

                    <option>Sub 10</option>

                    <option>Sub 12</option>

                    <option>Sub 15</option>

                    <option>Sub 17</option>

                </select>

                <textarea placeholder="Mensaje"></textarea>

                <button type="submit">
                    Enviar Inscripción
                </button>

            </form>

        </div>

    </section>

</body>
</html>
